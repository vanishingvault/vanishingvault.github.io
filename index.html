<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Vanishing Vault</title>
  <style>
    :root {
      --vv-bg: #3d484f;
      --vv-border: #616e77;
      --vv-text: #e2e2de;
      --vv-link: #94c9d7;
    }

    body {
      background-color: var(--vv-bg);
      color: var(--vv-text);
      font-family: Lato, sans-serif;
      font-size: 100%;
      max-width: 680px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.65;
    }

    h1, h3 { font-weight: 500; color: var(--vv-text); }
    a      { color: var(--vv-link); }
    hr     { background-color: var(--vv-border); border: none; height: 1px; }
  </style>
</head>
<body>   
  <p>Hello friend :)</p>
  <p>Looks like you are looking for the Vanishing Vault. You are just one step away.</p>
  <p><a href="https://vanishing-vault.itch.io/">Continue on to the Vault</a></p>
</body>
</html>
